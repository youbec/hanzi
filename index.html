<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>奥特生字大闯关</title>
<style>
  /* 基础设置：禁止滑动和缩放，全屏显示 */
  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; user-select: none; -webkit-user-select: none; }
  body { 
    font-family: 'Microsoft YaHei', sans-serif; 
    text-align: center; 
    background-color: #f0f8ff; 
    width: 100vw; height: 100vh; overflow: hidden; 
    display: flex; flex-direction: column;
  }
  
  /* 字卡铺满屏幕，加入轻微的3D质感 */
  .card { 
    flex: 1; width: 90vw; background: linear-gradient(145deg, #ffffff, #f0f0f0); 
    border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
    margin: 20px auto; display: flex; align-items: center; justify-content: center; 
    font-size: 45vmin; color: #333; font-weight: bold; transition: transform 0.1s;
  }
  
  /* 底部操作区 */
  .bottom-area {
    height: auto; padding: 15px 20px 40px; background-color: #fff;
    border-top-left-radius: 30px; border-top-right-radius: 30px;
    box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
  }
  
  #feedback { font-size: 22px; font-weight: bold; min-height: 32px; color: #ff6b6b; margin-bottom: 15px; }
  .correct { color: #4CAF50 !important; }
  
  /* 核心录音按钮 */
  button { 
    background-color: #4CAF50; color: white; border: none; 
    padding: 20px 0; font-size: 24px; border-radius: 50px; 
    width: 90%; max-width: 400px; font-weight: bold; outline: none;
    box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4); transition: all 0.2s;
  }
  button:disabled { background-color: #ccc; box-shadow: none; color: #666; }
  #speechBtn.recording { background-color: #f44336; box-shadow: 0 5px 15px rgba(244, 67, 54, 0.4); transform: scale(0.95); }
  
  #stats { margin-top: 15px; font-size: 15px; color: #888; display: flex; justify-content: space-around; }
</style>
</head>
<body>

  <div id="wordCard" class="card">加载中</div>
  
  <div class="bottom-area">
    <p id="feedback">正在召唤离线语音引擎...</p>
    <button id="speechBtn" disabled>请稍候...</button>
    
    <div id="stats">
      <span>错题本待复习: <strong id="mistakeCount" style="color:#ff6b6b;">0</strong> 个</span>
      <span id="modeStatus">🚀 学习模式</span>
    </div>
  </div>

  <script src="https://unpkg.com/vosk-browser@0.0.9/dist/vosk.js"></script>

  <script>
    // 基础生字库（后续你可以直接在这里替换成二年级下册的生字表）
    const newWords = ['天', '地', '人', '和', '学', '习', '快', '乐', '聪', '明'];
    let currentWord = '';
    let isReviewMode = false;
    
    let model, recognizer, audioContext;
    let mediaStream, source, processor;

    // 艾宾浩斯复习时间间隔：12小时, 1天, 2天, 4天, 7天
    const EBBINGHAUS_INTERVALS = [12 * 3600000, 86400000, 172800000, 345600000, 604800000];

    const wordCard = document.getElementById('wordCard');
    const speechBtn = document.getElementById('speechBtn');
    const feedback = document.getElementById('feedback');

    // 1. 初始化离线语音引擎
    async function initVosk() {
      try {
        feedback.innerText = "正在激活模型，第一次加载约需30秒...";
        // 连接到你刚才上传的 model 文件夹
        model = await Vosk.createModel('./model'); 
        
        recognizer = new model.KaldiRecognizer(16000);
        recognizer.setWords(true);

        feedback.innerText = "准备就绪！";
        speechBtn.disabled = false;
        speechBtn.innerText = "🎤 按住说话，松开识别";
        nextWord();
      } catch (e) {
        feedback.innerText = "加载失败，请刷新网页重试";
        console.error("Vosk初始化错误:", e);
      }
    }

    // 2. 错题本与艾宾浩斯逻辑
    function getMistakes() { return JSON.parse(localStorage.getItem('kid_mistakes') || '{}'); }
    function saveMistakes(m) { localStorage.setItem('kid_mistakes', JSON.stringify(m)); updateStats(); }

    function updateStats() {
      const m = getMistakes();
      const dueCount = Object.keys(m).filter(w => m[w].nextReviewTime <= Date.now()).length;
      document.getElementById('mistakeCount').innerText = dueCount;
    }

    function nextWord() {
      feedback.innerText = "请按住绿色按钮，大声读出这个字";
      feedback.className = "";
      const m = getMistakes();
      const dueWords = Object.keys(m).filter(w => m[w].nextReviewTime <= Date.now());

      if (dueWords.length > 0) {
        isReviewMode = true;
        currentWord = dueWords[0];
        document.getElementById('modeStatus').innerText = "🔥 复习模式";
      } else {
        isReviewMode = false;
        currentWord = newWords[Math.floor(Math.random() * newWords.length)];
        document.getElementById('modeStatus').innerText = "🚀 学习模式";
      }
      wordCard.innerText = currentWord;
    }

    // 3. 校验识别结果
    function checkResult(text) {
      // 离线模型返回的字之间可能有空格，先去掉空格再比对
      const cleanText = text.replace(/\s+/g, '');
      const isCorrect = cleanText.includes(currentWord);
      const m = getMistakes();

      if (isCorrect) {
        feedback.innerText = `🎉 读对啦！光之力量+1 ("${cleanText}")`;
        feedback.className = "correct";
        
        if (isReviewMode && m[currentWord]) {
          m[currentWord].level++;
          if (m[currentWord].level >= EBBINGHAUS_INTERVALS.length) delete m[currentWord];
          else m[currentWord].nextReviewTime = Date.now() + EBBINGHAUS_INTERVALS[m[currentWord].level];
        }
        saveMistakes(m);
        setTimeout(nextWord, 1500);
      } else {
        const showText = cleanText || '未听清';
        feedback.innerText = `💪 再试一次！奥特曼相信你 (听到: ${showText})`;
        
        if (!m[currentWord]) m[currentWord] = { level: 0, nextReviewTime: Date.now() + EBBINGHAUS_INTERVALS[0] };
        else if (isReviewMode) {
          m[currentWord].level = 0;
          m[currentWord].nextReviewTime = Date.now() + EBBINGHAUS_INTERVALS[0];
        }
        saveMistakes(m);
      }
    }

    // 4. 控制录音与停止
    async function startRecording(e) {
      if (e) e.preventDefault();
      if (speechBtn.disabled) return;
      
      try {
        if (!audioContext) {
          // 强制使用 16000 采样率匹配模型
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          audioContext = new AudioContext({sampleRate: 16000});
        }
        if (audioContext.state === 'suspended') await audioContext.resume();

        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        source = audioContext.createMediaStreamSource(mediaStream);
        processor = audioContext.createScriptProcessor(4096, 1, 1);
        
        processor.onaudioprocess = (event) => {
          const data = event.inputBuffer.getChannelData(0);
          const pcm = new Int16Array(data.length);
          for (let i = 0; i < data.length; i++) {
            pcm[i] = Math.min(1, Math.max(-1, data[i])) * 0x7FFF;
          }
          recognizer.acceptWaveform(pcm);
        };

        source.connect(processor);
        processor.connect(audioContext.destination);
        
        speechBtn.classList.add('recording');
        speechBtn.innerText = "🎙️ 正在倾听...";
        feedback.innerText = "大声读出来吧！";
        feedback.className = "";
      } catch (err) {
        feedback.innerText = "⚠️ 请允许麦克风权限哦！";
        console.error(err);
      }
    }

    function stopRecording(e) {
      if (e) e.preventDefault();
      if (!speechBtn.classList.contains('recording')) return;
      
      speechBtn.classList.remove('recording');
      speechBtn.innerText = "⏳ 正在解析...";
      
      if (processor) {
        processor.disconnect();
        source.disconnect();
        mediaStream.getTracks().forEach(t => t.stop());
        
        // 获取最终识别结果
        const result = recognizer.finalResult();
        checkResult(result.text || "");
        
        speechBtn.innerText = "🎤 按住说话，松开识别";
      }
    }

    // 5. 绑定触摸与鼠标事件
    speechBtn.addEventListener('touchstart', startRecording, {passive: false});
    speechBtn.addEventListener('touchend', stopRecording, {passive: false});
    speechBtn.addEventListener('mousedown', startRecording);
    speechBtn.addEventListener('mouseup', stopRecording);
    speechBtn.addEventListener('mouseleave', stopRecording);

    // 页面启动时初始化
    updateStats();
    initVosk();
  </script>
</body>
</html>
