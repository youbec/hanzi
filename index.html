<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>生字大闯关</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
  body { 
    font-family: 'Comic Sans MS', 'Microsoft YaHei', sans-serif; 
    text-align: center; 
    background-color: #f0f8ff; 
    width: 100vw; height: 100vh; 
    overflow: hidden; 
    display: flex; flex-direction: column;
  }
  .card { 
    flex: 1; width: 90vw; background: white; 
    border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
    margin: 20px auto; display: flex; align-items: center; justify-content: center; 
    font-size: 40vmin; color: #333; transition: transform 0.1s; 
  }
  .card:active { transform: scale(0.98); }
  .bottom-area {
    height: auto; padding: 10px 20px 30px; background-color: #fff;
    border-top-left-radius: 30px; border-top-right-radius: 30px;
    box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
  }
  #feedback { 
    font-size: 24px; font-weight: bold; min-height: 36px; 
    color: #ff6b6b; margin-bottom: 20px;
  }
  .correct { color: #4CAF50 !important; }
  button { 
    background-color: #4CAF50; color: white; border: none; 
    padding: 18px 0; font-size: 24px; border-radius: 50px; 
    box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4); 
    cursor: pointer; margin: 5px; outline: none;
    width: 90%; max-width: 400px; font-weight: bold;
  }
  button:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(76, 175, 80, 0.4); }
  #reviewBtn { 
    background-color: #FF9800; box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4); 
    margin-top: 15px; font-size: 20px; padding: 15px 0;
  }
  #stats { margin-top: 10px; font-size: 16px; color: #888;}
</style>
</head>
<body>

  <div id="wordCard" class="card">准</div>
  
  <div class="bottom-area">
    <p id="feedback"></p>
    
    <button id="speechBtn">🎤 按住 / 点击朗读</button>
    
    <div id="stats">
      <p>错题本中待复习的字: <span id="mistakeCount">0</span> 个</p>
      <button id="reviewBtn">进入错题复习模式</button>
    </div>
  </div>

  <script>
    const newWords = ['天', '地', '人', '和', '学', '习', '快', '乐', '聪', '明'];
    let currentWord = '';
    let isReviewMode = false;

    const EBBINGHAUS_INTERVALS = [
      1 * 60 * 1000,           // 级别0: 1分钟后复习 (测试用)
      24 * 60 * 60 * 1000,     // 级别1: 1天
      2 * 24 * 60 * 60 * 1000, // 级别2: 2天
      4 * 24 * 60 * 60 * 1000, // 级别3: 4天
      7 * 24 * 60 * 60 * 1000  // 级别4: 7天
    ];

    const wordCard = document.getElementById('wordCard');
    const speechBtn = document.getElementById('speechBtn');
    const feedback = document.getElementById('feedback');
    const mistakeCountEl = document.getElementById('mistakeCount');
    const reviewBtn = document.getElementById('reviewBtn');

    function getMistakes() {
      return JSON.parse(localStorage.getItem('kid_mistakes') || '{}');
    }
    
    function saveMistakes(mistakes) {
      localStorage.setItem('kid_mistakes', JSON.stringify(mistakes));
      updateStats();
    }
    
    function updateStats() {
      const mistakes = getMistakes();
      const now = Date.now();
      const dueCount = Object.keys(mistakes).filter(word => mistakes[word].nextReviewTime <= now).length;
      mistakeCountEl.innerText = dueCount;
    }

    function nextWord() {
      feedback.innerText = ""; // 切换新字时清空提示语
      feedback.className = "";
      
      if (isReviewMode) {
        const mistakes = getMistakes();
        const now = Date.now();
        const dueWords = Object.keys(mistakes).filter(word => mistakes[word].nextReviewTime <= now);
        
        if (dueWords.length > 0) {
          currentWord = dueWords[0];
          wordCard.innerText = currentWord;
        } else {
          isReviewMode = false;
          alert("太棒了！今天的错题复习任务全部完成！");
          nextWord(); 
        }
      } else {
        currentWord = newWords[Math.floor(Math.random() * newWords.length)];
        wordCard.innerText = currentWord;
      }
    }

    function handleResult(spokenText) {
      const isCorrect = spokenText.includes(currentWord);
      const mistakes = getMistakes();

      if (isCorrect) {
        feedback.innerText = `🎉 读对啦！"${spokenText}"`;
        feedback.className = "correct";
        
        if (isReviewMode && mistakes[currentWord]) {
          let wordData = mistakes[currentWord];
          wordData.level += 1;
          
          if (wordData.level >= EBBINGHAUS_INTERVALS.length) {
            delete mistakes[currentWord];
          } else {
            wordData.nextReviewTime = Date.now() + EBBINGHAUS_INTERVALS[wordData.level];
          }
          saveMistakes(mistakes);
        }
        setTimeout(nextWord, 1500);

      } else {
        feedback.innerText = `💪 再试一次！识别成: "${spokenText || '未听清'}"`;
        feedback.className = "";
        
        if (!mistakes[currentWord]) {
           mistakes[currentWord] = { level: 0, nextReviewTime: Date.now() + EBBINGHAUS_INTERVALS[0] };
        } else if (isReviewMode) {
           mistakes[currentWord].level = 0;
           mistakes[currentWord].nextReviewTime = Date.now() + EBBINGHAUS_INTERVALS[0];
        }
        saveMistakes(mistakes);
      }
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.lang = 'zh-CN'; 
      recognition.interimResults = false;

      speechBtn.addEventListener('click', () => {
        feedback.innerText = "🎙️ 正在听...";
        feedback.className = "";
        try {
          recognition.start();
        } catch(e) {}
      });

      recognition.onresult = (event) => {
        const spokenText = event.results[0][0].transcript;
        handleResult(spokenText);
      };

      recognition.onerror = (event) => {
        if(event.error === 'not-allowed') {
          feedback.innerText = "⚠️ 请允许麦克风权限！";
        } else {
          feedback.innerText = "⚠️ 没听清，请重试";
        }
      };
    } else {
      // 针对微信环境的专属提示
      feedback.innerText = "⚠️ 微信内不支持语音，请点击右上角【在浏览器打开】";
      speechBtn.disabled = true;
      speechBtn.style.backgroundColor = "#ccc";
    }

    reviewBtn.addEventListener('click', () => {
      isReviewMode = true;
      nextWord();
    });

    updateStats();
    nextWord();
  </script>
</body>
</html>
